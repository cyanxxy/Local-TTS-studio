[package]
name = "qwen3-tts-rs"
version = "0.2.2"
edition = "2021"
authors = ["Michael Yuan <michael@secondstate.io>"]
description = "Rust port of Qwen3 TTS - Text-to-Speech model"
license = "Apache-2.0"
repository = "https://github.com/juntao/qwen3_tts_rs"
keywords = ["tts", "text-to-speech", "qwen", "ai", "machine-learning"]
categories = ["multimedia::audio", "science"]
exclude = ["models/", "*.wav", ".DS_Store"]

[dependencies]
# PyTorch bindings via libtorch (0.20 for PyTorch 2.7.1 compatibility)
# Only used with the tch-backend feature
tch = { version = "0.20", optional = true }

# Tokenization
tokenizers = "0.21"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Audio processing
hound = "3.5"
rubato = "0.16"
mp3lame-encoder = "0.2"
flacenc = "0.5"
audiopus = "0.2"
audiopus_sys = { version = "0.1", features = ["static"] }
ogg = "0.9"

# HTTP and file handling
base64 = "0.22"
url = "2.5"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"

# API server
axum = { version = "0.8", features = ["multipart"] }
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
async-stream = "0.3"
clap = { version = "4", features = ["derive"] }
tower-http = { version = "0.6", features = ["trace"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
default = ["tch-backend"]
# Use libtorch/PyTorch as the computation backend (default)
tch-backend = ["dep:tch"]
# Use Apple MLX as the computation backend (macOS Apple Silicon only).
# Requires the bundled mlx-c source tree documented in OPEN_TTS_VENDOR.md.
mlx = []

[build-dependencies]
cmake = "0.1"

[[bin]]
name = "tts"
path = "src/bin/tts.rs"

[[bin]]
name = "voice_clone"
path = "src/bin/voice_clone.rs"

[[bin]]
name = "api_server"
path = "src/bin/api_server.rs"

[[bin]]
name = "pibot-tts-worker"
path = "src/bin/worker.rs"

[[bin]]
name = "qwen3-tts"
path = "src/bin/qwen3_tts_cli.rs"

[[bin]]
name = "trace_vocoder"
path = "src/bin/trace_vocoder.rs"

[dev-dependencies]
tempfile = "3.14"
