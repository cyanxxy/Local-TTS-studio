name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    name: Lint, test, and build web
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit -p tsconfig.electron.json
      # rustLocalBridge.test.ts compiles the native bridge in beforeAll; the
      # native gate for this repo is the rust-bridge workflow on macOS.
      - run: npx vitest run --exclude "electron/rustLocalBridge.test.ts"
      - run: npm run build:web
